<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drawer デバッグ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDGothic:wght@400;700&family=M+PLUS+1:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: "Overused Grotesk";
      src: url("/fonts/OverusedGrotesk-SemiBold.woff2") format('woff2');
      font-weight: 600;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: #1e1e1e; color: #ccc; font-family: sans-serif; }

    #svg-wrap { background: #333; display: flex; justify-content: center; }
    svg { width: 100%; max-width: 1920px; display: block; }

    #controls {
      padding: 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #controls h2 { margin: 0 0 4px; font-size: 14px; color: #aaa; }

    #param-list {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 6px 12px;
      align-items: start;
    }
    .param-label {
      font-size: 13px;
      color: #9cdcfe;
      padding-top: 5px;
      word-break: break-all;
    }
    .param-input {
      background: #2d2d2d;
      border: 1px solid #444;
      border-radius: 4px;
      color: #d4d4d4;
      font-size: 13px;
      padding: 4px 8px;
      width: 100%;
    }
    .param-input:focus { outline: none; border-color: #569cd6; }
    textarea.param-input { resize: vertical; font-family: monospace; }
    input[type="checkbox"].param-input {
      width: auto;
      padding: 0;
      margin-top: 6px;
      accent-color: #569cd6;
    }

    .toolbar-btn {
      padding: 6px 16px;
      background: #0e639c;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
    }
    .toolbar-btn:hover { background: #1177bb; }
    #redraw-btn {
      align-self: flex-start;
      padding: 8px 24px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="svg-wrap">
    <svg id="display" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080"></svg>
  </div>

  <div id="svg-toolbar" style="padding:8px 24px;display:flex;flex-wrap:wrap;align-items:center;gap:12px;background:#2a2a2a;border-bottom:1px solid #444;">
    <button id="redraw-btn" class="toolbar-btn">再描画</button>
    <button id="lang-btn"       class="toolbar-btn">言語切替 [L]</button>
    <button id="runstate-btn"   class="toolbar-btn">runState [R]</button>
    <button id="terminal-btn"   class="toolbar-btn">isTerminal [T]</button>
    <button id="direction-btn"   class="toolbar-btn">direction [M]</button>
    <button id="isdrawtime-btn"    class="toolbar-btn">isDrawTime [E]</button>
    <button id="isdrawlinename-btn"      class="toolbar-btn">isDrawLineName [N]</button>
    <button id="isdawnextstation-btn" class="toolbar-btn">isDrawNextStation [S]</button>
    <button id="isstopping-btn"       class="toolbar-btn">isStopping [I]</button>
    <button id="page-btn"                   class="toolbar-btn">ページ切替 [P]</button>
    <button id="rootsectiontype-btn"       class="toolbar-btn">rootSection.type [Q]</button>
    <button id="arrowsectiontype-btn"      class="toolbar-btn">arrowSection.type [W]</button>
    <button id="rootsectionisconnect-btn"  class="toolbar-btn">rootSection.isConnect [alt+Q]</button>
    <button id="arrowsectionisconnect-btn" class="toolbar-btn">arrowSection.isConnect [alt+W]</button>
    <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;">
      <input type="checkbox" id="debug-chk" style="accent-color:#569cd6;">
      デバッグ表示（arrangeArea境界: 青 / 末端要素境界: 赤）
    </label>
  </div>

  <div id="controls">
    <h2>描画パラメータ</h2>
    <div id="param-list"></div>
  </div>

  <script src="src/utility/Animator.js"></script>
  <script src="src/utility/TextDrawer.js"></script>
  <script src="src/utility/NumIconDrawer.js"></script>
  <script src="src/utility/ExprParser.js"></script>
  <script src="src/utility/MulShadowUtil.js"></script>
  <script src="src/objects/LcdPartsObj.js"></script>
  <script src="src/objects/GObj.js"></script>
  <script src="src/objects/StaticObj.js"></script>
  <script src="src/objects/GroupObj.js"></script>
  <script src="src/objects/TextBoxObj.js"></script>
  <script src="src/objects/ArrangeObj.js"></script>
  <script src="src/objects/SlotObj.js"></script>
  <script src="src/objects/NumIconObj.js"></script>
  <script src="src/main/Drawer.js"></script>
  <script>
    const svg = document.getElementById('display');
    const paramList = document.getElementById('param-list');
    let drawer;
    let pageNameList = []; // pageNameList.jsonから読み込んだページ一覧
    let currentPageIndex = 0; // 現在のページインデックス（index側で管理）

    // drawParamsの各エントリを入力フィールドとして生成する
    function buildControls(params) {
      paramList.innerHTML = '';
      for (const [key, val] of Object.entries(params)) {
        const label = document.createElement('div');
        label.className = 'param-label';
        label.textContent = key;

        let input;
        if (typeof val === 'boolean') {
          input = document.createElement('input');
          input.type = 'checkbox';
          input.checked = val;
          input.dataset.type = 'boolean';
        } else if (typeof val === 'number') {
          input = document.createElement('input');
          input.type = 'number';
          input.value = val;
          input.dataset.type = 'number';
        } else if (typeof val === 'object' && val !== null) {
          input = document.createElement('textarea');
          input.value = JSON.stringify(val, null, 2);
          input.rows = Math.min(Object.keys(val).length + 2, 12);
          input.dataset.type = 'json';
        } else {
          input = document.createElement('input');
          input.type = 'text';
          input.value = val ?? '';
          input.dataset.type = 'string';
        }
        input.className = 'param-input';
        input.dataset.key = key;

        paramList.appendChild(label);
        paramList.appendChild(input);
      }
    }

    // 入力フィールドからdrawParamsを収集する
    function collectParams() {
      const params = {};
      paramList.querySelectorAll('[data-key]').forEach(el => {
        const key = el.dataset.key;
        switch (el.dataset.type) {
          case 'boolean': params[key] = el.checked; break;
          case 'number':  params[key] = Number(el.value); break;
          case 'json':
            try { params[key] = JSON.parse(el.value); }
            catch { params[key] = {}; }
            break;
          default: params[key] = el.value;
        }
      });
      return params;
    }

    // SVGをクリアして再描画する
    function redraw() {
      drawer.setDebug(document.getElementById('debug-chk').checked);
      while (svg.firstChild) svg.removeChild(svg.firstChild);
      svg.appendChild(drawer.draw(collectParams()));
    }

    // SVGファイルをフェッチしてSVGElement（documentElement）を返す
    async function fetchSVG(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`fetch failed: ${res.status} ${url}`);
      const text = await res.text();
      return new DOMParser().parseFromString(text, 'image/svg+xml').documentElement;
    }

    // numIconPresetSVGをキーごとにフェッチして { key: SVGElement } マップを返す
    async function loadNumIconPresets(presetKeys) {
      const presets = {};
      await Promise.all(presetKeys.map(async key => {
        try {
          presets[key] = await fetchSVG(`/presetNumIcons/${key}.svg`);
        } catch (e) {
          console.warn(`numIcon preset not found: ${key}`);
        }
      }));
      return presets;
    }

    // bodySVGをPages配列のファイル名ごとにフェッチして Map<filename, SVGElement> を返す
    async function loadBodySVGs(pages) {
      const map = new Map();
      await Promise.all(pages.map(async filename => {
        try {
          map.set(filename, await fetchSVG(`./pageInput/tokyu/body/${filename}`));
        } catch (e) {
          console.warn(`body SVG not found: ${filename}`);
        }
      }));
      return map;
    }

    window.onload = async () => {
      // LcdAnimatorをグローバルシングルトンとして初期化（langChange時のアニメーションで使用）
      window.lcdAnimator = new LcdAnimator();

      // 設定ファイル群を並列フェッチし、残りのリソースをロードしてDrawerを初期化
      const [drawParams, loadedPageNameList, numIconPresetKeys] = await Promise.all([
        fetch('./drawParams.json').then(r => r.json()),
        fetch('./pageNameList.json').then(r => r.json()),
        fetch('./numIconPresetKeys.json').then(r => r.json()),
      ]);
      pageNameList = loadedPageNameList;
      const [iconList, numIconPresets, headerSVG, bodySVGMap] = await Promise.all([
        fetch('./iconList.json').then(r => r.json()),
        loadNumIconPresets(numIconPresetKeys),
        fetchSVG('./pageInput/tokyu/header/headerSVG.svg'),
        loadBodySVGs(pageNameList),
      ]);

      drawer = new Drawer();
      drawer.load(drawParams, iconList, numIconPresets, headerSVG, bodySVGMap);

      // lcdSVGのサイズをheaderSVGのviewBoxに合わせる
      const viewBox = headerSVG.getAttribute('viewBox');
      if (viewBox) svg.setAttribute('viewBox', viewBox);

      // 初期描画とコントロール生成
      svg.appendChild(drawer.draw(drawParams));
      buildControls(drawParams);

      document.getElementById('redraw-btn').addEventListener('click', redraw);

      // キーボードショートカット: L=langIdサイクル（アニメーション遷移） / R=runStateサイクル / T=isTerminal切替
      // L キーのアニメーション時間設定
      const LANG_TRANS_MS = 500; // 遷移アニメーション時間[ms]
      const LANG_GAP_MS   = 0;   // 遷移開始までの遅延[ms]

      // 各操作を関数化してボタンとキーボードから共用する
      function doLangCycle() {
        cycleNumberParam('langId', 0, 2);
        const el = paramList.querySelector('[data-key="langId"]');
        const newLangId = el ? Number(el.value) : 0;
        drawer.langChange(newLangId, LANG_TRANS_MS, LANG_GAP_MS);
      }
      function doRunStateCycle() {
        cycleNumberParam('runState', 0, 2);
        redraw();
      }
      function doTerminalToggle() {
        toggleBoolParam('isTerminal');
        redraw();
      }
      function doDirectionToggle() {
        cycleNumberParam('direction', 0, 1);
        redraw();
      }
      function doIsDrawTimeToggle() {
        toggleBoolParam('isDrawTime');
        redraw();
      }
      function doIsDrawLineNameToggle() {
        toggleBoolParam('isDrawLineName');
        redraw();
      }
      function doIsDrawNextStationToggle() {
        toggleBoolParam('isDrawNextStation');
        redraw();
      }
      function doIsStoppingToggle() {
        toggleBoolParam('isStopping');
        redraw();
      }
      function doPageCycle() {
        if (pageNameList.length === 0) return;
        currentPageIndex = (currentPageIndex + 1) % pageNameList.length;
        // UIのpage入力フィールドを更新してredrawで反映させる
        const el = paramList.querySelector('[data-key="page"]');
        if (el) el.value = pageNameList[currentPageIndex];
        redraw();
      }
      function doRootSectionTypeCycle() {
        cycleNestedNumberParam('rootSection', 'type', 0, 1);
        redraw();
      }
      function doArrowSectionTypeCycle() {
        cycleNestedNumberParam('arrowSection', 'type', 0, 1);
        redraw();
      }
      function doRootSectionIsConnectToggle() {
        toggleNestedBoolParam('rootSection', 'isConnect');
        redraw();
      }
      function doArrowSectionIsConnectToggle() {
        toggleNestedBoolParam('arrowSection', 'isConnect');
        redraw();
      }

      document.getElementById('lang-btn')            .addEventListener('click', doLangCycle);
      document.getElementById('runstate-btn')        .addEventListener('click', doRunStateCycle);
      document.getElementById('terminal-btn')        .addEventListener('click', doTerminalToggle);
      document.getElementById('direction-btn')       .addEventListener('click', doDirectionToggle);
      document.getElementById('isdrawtime-btn')      .addEventListener('click', doIsDrawTimeToggle);
      document.getElementById('isdrawlinename-btn')  .addEventListener('click', doIsDrawLineNameToggle);
      document.getElementById('isdawnextstation-btn').addEventListener('click', doIsDrawNextStationToggle);
      document.getElementById('isstopping-btn')       .addEventListener('click', doIsStoppingToggle);
      document.getElementById('page-btn')                   .addEventListener('click', doPageCycle);
      document.getElementById('rootsectiontype-btn')       .addEventListener('click', doRootSectionTypeCycle);
      document.getElementById('arrowsectiontype-btn')      .addEventListener('click', doArrowSectionTypeCycle);
      document.getElementById('rootsectionisconnect-btn')  .addEventListener('click', doRootSectionIsConnectToggle);
      document.getElementById('arrowsectionisconnect-btn') .addEventListener('click', doArrowSectionIsConnectToggle);

      document.addEventListener('keydown', e => {
        // 入力欄にフォーカスがある場合は無視
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

        const key = e.key.toUpperCase();
        if (e.altKey) {
          // alt+キー: ネストパラメータのbool切替
          if      (key === 'Q') { e.preventDefault(); doRootSectionIsConnectToggle(); }
          else if (key === 'W') { e.preventDefault(); doArrowSectionIsConnectToggle(); }
        } else {
          if      (key === 'L') doLangCycle();
          else if (key === 'R') doRunStateCycle();
          else if (key === 'T') doTerminalToggle();
          else if (key === 'M') doDirectionToggle();
          else if (key === 'E') doIsDrawTimeToggle();
          else if (key === 'N') doIsDrawLineNameToggle();
          else if (key === 'S') doIsDrawNextStationToggle();
          else if (key === 'I') doIsStoppingToggle();
          else if (key === 'P') doPageCycle();
          else if (key === 'Q') doRootSectionTypeCycle();
          else if (key === 'W') doArrowSectionTypeCycle();
        }
      });
    };

    // 数値パラメータをmin～maxの範囲でサイクルさせる
    function cycleNumberParam(key, min, max) {
      const el = paramList.querySelector(`[data-key="${key}"]`);
      if (!el) return;
      const current = Number(el.value);
      el.value = current >= max ? min : current + 1;
    }

    // boolean パラメータのチェック状態を反転する
    function toggleBoolParam(key) {
      const el = paramList.querySelector(`[data-key="${key}"]`);
      if (!el) return;
      el.checked = !el.checked;
    }

    // JSONテキストエリアで管理されているネストパラメータのサブフィールドを数値サイクルさせる
    function cycleNestedNumberParam(parentKey, subKey, min, max) {
      const el = paramList.querySelector(`[data-key="${parentKey}"]`);
      if (!el) return;
      try {
        const obj = JSON.parse(el.value);
        const current = Number(obj[subKey]);
        obj[subKey] = isNaN(current) || current >= max ? min : current + 1;
        el.value = JSON.stringify(obj, null, 2);
      } catch {}
    }

    // JSONテキストエリアで管理されているネストパラメータのサブフィールドのbooleanを反転する
    function toggleNestedBoolParam(parentKey, subKey) {
      const el = paramList.querySelector(`[data-key="${parentKey}"]`);
      if (!el) return;
      try {
        const obj = JSON.parse(el.value);
        obj[subKey] = !obj[subKey];
        el.value = JSON.stringify(obj, null, 2);
      } catch {}
    }
  </script>
</body>
</html>
