<svg id="display" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
    <!-- defs.svgから移植したグラデーション・フィルター定義 -->
    <defs>
        <linearGradient id="innerGradient" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="rgb(255, 255, 255)" />
            <stop offset="51%" stop-color="rgb(220, 220, 220)" />
            <stop offset="51.11%" stop-color="rgb(158, 158, 158)" />
            <stop offset="81.11%" stop-color="rgb(201, 201, 201)" />
            <stop offset="100%" stop-color="rgb(228, 228, 228)" />
        </linearGradient>
        <linearGradient id="outerGradient" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="rgb(255, 255, 255)" />
            <stop offset="17.78%" stop-color="rgb(228, 228, 228)" />
            <stop offset="48.89%" stop-color="rgb(182, 182, 182)" />
            <stop offset="51.11%" stop-color="rgb(158, 158, 158)" />
            <stop offset="81.11%" stop-color="rgb(201, 201, 201)" />
            <stop offset="100%" stop-color="rgb(228, 228, 228)" />
        </linearGradient>
        <linearGradient id="outlineGradient" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="rgb(44, 44, 44)" />
            <stop offset="100%" stop-color="rgb(211, 211, 211)" />
        </linearGradient>
        <filter id="outline">
            <feMorphology in="SourceAlpha" result="DILATED" operator="dilate" radius="2" />
            <feFlood flood-color="black" result="BLACK"/>
            <feComposite in="BLACK" in2="DILATED" operator="in" result="OUTLINE"/>
            <feMerge>
                <feMergeNode in="OUTLINE"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="black" flood-opacity="0.5"/>
        </filter>
        <filter id="dropShadow2" x="-50%" y="-50%" width="200%" height="200%">
            <feDropShadow dx="0" dy="-4" stdDeviation="4" flood-color="black" flood-opacity="0.5"/>
        </filter>
        <linearGradient id="lineShadowLeft" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#ffffff" />
            <stop offset="100%" stop-color="#000000" />
        </linearGradient>
        <linearGradient id="lineShadowRight" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#000000" />
            <stop offset="100%" stop-color="#ffffff" />
        </linearGradient>
        <filter id="grayscale">
            <feColorMatrix type="matrix" values="0.3333 0.3333 0.3333 0 0.2 0.3333 0.3333 0.3333 0 0.2 0.3333 0.3333 0.3333 0 0.2 0 0 0 1 0" />
        </filter>
    </defs>

    <!-- 背景 -->
    <rect lcdParts="static" id="background" x="0" y="0" width="1920" height="1080" fill="#FFFFFF" />

    <!-- ヘッダー背景 -->
    <!-- <rect lcdParts="static" x="0" y="0" width="1920" height="" fill="#000000" /> -->
    <line lcdParts="static" x1="0" y1="457" x2="1920" y2="457" stroke="#000000" stroke-width="2" />

    <!-- ヘッダーテキスト -->
    <rect lcdParts="textBox" lcdText="のりかえ" x="661" y="376" width="257" height="62" fill="#999999" data-style='{"fontFamily": "BIZ UDGothic", "fontWeight": "600", "textAnchor": "middle"}' />
    <rect lcdParts="textBox" lcdText="/" x="918" y="376" width="64" height="62" fill="#999999" data-style='{"fontFamily": "BIZ UDGothic", "fontWeight": "400", "textAnchor": "middle"}' />
    <rect lcdParts="textBox" lcdText="Transfer" x="982" y="376" width="276" height="62" fill="#999999" data-style='{"fontFamily": "sans-serif", "fontWeight": "400", "textAnchor": "middle"}' />

    <!-- 乗換リスト(１行の場合) -->
    <g visibility="hidden" lcdParts="arrange" isDraw="transfers.transferList.length == 1" lcd-holAlign="center" arrange-interval="30">
        <rect lcdParts="arrangeArea" x="85" y="667" width="1750" height="140" fill="#99999950" />
        <rect lcd-funcCall="transferBox" lcd-arg="transfer:transfers.transferList[0]" x="85" y="480" width="1263" height="140" fill="#99999930" />
    </g>
    <!-- 乗換リスト(２行の場合) -->
    <g visibility="hidden" lcdParts="arrange" isDraw="transfers.transferList.length == 2" arrange-alignDepth="2" lcd-holAlign="center" arrange-interval="110" arrange-axis="y">
        <rect lcdParts="arrangeArea" x="85" y="558" width="1750" height="390" fill="#99999950" />
        <g lcdParts="arrange" lcd-arg="transfers:transfers.transferList" lcd-holAlign="center" arrange-interval="60">
            <rect lcdParts="arrangeArea" x="85" y="558" width="1750" height="140" fill="#99999950" />
            <rect lcd-funcCall="transferBox" lcd-arg="transfer:$transfers" x="85" y="480" width="1263" height="140" fill="#99999930" />
        </g>
    </g>
    <!-- 乗換リスト(３行の場合) -->
    <g visibility="hidden" lcdParts="arrange" isDraw="transfers.transferList.length == 3" arrange-alignDepth="2" arrange-lineAlign="left" lcd-holAlign="center" arrange-interval="40" arrange-axis="y">
        <rect lcdParts="arrangeArea" x="85" y="480" width="1750" height="500" fill="#99999950" />
        <g lcdParts="arrange" lcd-arg="transfers:transfers.transferList" lcd-holAlign="center" arrange-interval="60">
            <rect lcdParts="arrangeArea" x="85" y="480" width="1750" height="140" fill="#99999950" />
            <rect lcd-funcCall="transferBox" lcd-arg="transfer:$transfers" x="85" y="480" width="1263" height="140" fill="#99999930" />
        </g>
    </g>
    <!-- 乗換リスト(４行以上の場合) -->
    <g visibility="" lcdParts="arrange" isDraw="transfers.transferList.length > 3" arrange-alignDepth="2" arrange-lineAlign="left" lcd-holAlign="center" arrange-interval="20" arrange-axis="y">
        <rect lcdParts="arrangeArea" x="85" y="480" width="1750" height="500" fill="#99999950" />
        <g lcdParts="arrange" lcd-arg="transfers:transfers.transferList" lcd-holAlign="center" arrange-interval="60">
            <rect lcdParts="arrangeArea" x="85" y="480" width="1750" height="140" fill="#99999950" />
            <rect lcd-funcCall="transferBox" lcd-arg="transfer:$transfers" x="85" y="480" width="1263" height="140" fill="#99999930" />
        </g>
    </g>


    <!-- フッター -->
    <!-- 次の停車駅 -->
    <rect lcdParts="textBox" lcdText="#{whole.nowStation.name}を出ますと【#{whole.nextStopName}】にとまります" visible="langId != 2" isDraw="isDrawNextStation" x="30" y="1010" width="1310" height="50" fill="#999999" data-style='{"fontFamily": "BIZ UDGothic", "fontWeight": "bold", "textAnchor": "start", "fill": "rgb(0, 0, 0)"}' lang="ja" />



    <!-- 関数定義 -->
    <!-- 各パーツ -->
    <g lcd-funcDef="transferBox">
        <rect lcdParts="funcArea" x="85" y="480" width="1263" height="140" fill="#99999950" />
        <g lcdParts="arrange" arrange-interval="93" lcd-fitX="true">
            <rect lcdParts="arrangeArea" x="85" y="480" width="1263" height="140" fill="#d2d2d2FF" />
            <rect lcd-funcCall="transferLineBox" x="85" y="480" width="620" height="140" fill="#99999930" />
            <rect lcd-funcCall="transferStationBox" isDraw="$transfer.station != null" lcd-verAlign="center" x="798" y="498" width="550" height="102" fill="#99999930" />
        </g>
    </g>

    <g lcd-funcDef="transferLineBox">
        <rect lcdParts="funcArea" x="85" y="480" width="620" height="140" fill="#99999950" />
        <g lcdParts="arrange" arrange-interval="10" lcd-fitX="true">
            <rect lcdParts="arrangeArea" x="85" y="480" width="620" height="140" fill="#d2d2d2FF" />
            <rect lcdParts="textBox" lcdText="#{$transfer.lineIcon}" lcd-minComRatio="1" lcd-fitX="true" x="85" y="480" width="140" height="140" fill="#99999950" data-style='{"fontFamily": "BIZ UDGothic", "fontWeight": "600", "textAnchor": "start", "letterSpacing": "5px"}' />
            <g lcdParts="arrange" arrange-interval="15" arrange-axis="y" lcd-fitX="true">
                <rect lcdParts="arrangeArea" x="225" y="480" width="480" height="140" fill="#99999950" />
                <rect lcdParts="textBox" lcdText="#{$transfer.name}" lcd-fitX="true" x="225" y="483" width="480" height="75" fill="#444444" data-style='{"fontFamily": "BIZ UDGothic", "fontWeight": "600", "textAnchor": "start"}' />
                <rect lcdParts="textBox" lcdText="#{$transfer.eng}" lcd-fitX="true" x="225" y="573" width="480" height="42" fill="#444444" data-style='{"fontFamily": "sans-serif", "fontWeight": "600", "textAnchor": "start"}' />
            </g>
        </g>
    </g>

    <g lcd-funcDef="transferStationBox">
        <rect lcdParts="funcArea" x="798" y="498" width="550" height="102" fill="#99999950" />
        <g lcdParts="arrange" arrange-interval="10" lcd-fitX="true">
            <rect lcdParts="arrangeArea" x="798" y="498" width="550" height="102" fill="#d2d2d2FF" />
            <rect lcdParts="numbering" lcd-numKey="#{$transfer.station.type}" symbolText="#{$transfer.station.symbol}" numberText="#{$transfer.station.number}" lineColor="#{$transfer.station.color}" lcd-minComRatio="1" x="798" y="498" width="102" height="102" fill="#99999950" />
            <g lcdParts="arrange" arrange-interval="6" arrange-axis="y" lcd-fitX="true">
                <rect lcdParts="arrangeArea" x="900" y="498" width="448" height="102" fill="#99999950" />
                <rect lcdParts="textBox" lcdText="#{$transfer.station.name}駅" lcd-fitX="true" x="900" y="498" width="448" height="54" fill="#99999950" data-style='{"fontFamily": "BIZ UDGothic", "fontWeight": "600", "textAnchor": "start"}' />
                <rect lcdParts="textBox" lcdText="#{$transfer.station.eng} Sta." lcd-fitX="true" x="900" y="558" width="448" height="34" fill="#444444" data-style='{"fontFamily": "sans-serif", "fontWeight": "600", "textAnchor": "start"}' />
            </g>
        </g>
    </g>

    <!-- 参考画像 -->
    <!-- <image href="./../../../imgs/tokyu-transfers.jpg" x="0" y="0" width="1920" height="1080" opacity="0.2" /> -->
    <!-- <image href="./../../../imgs/tokyu-transfers2_2.jpg" x="0" y="0" width="1920" height="1080" opacity="0.2" /> -->
    <image href="./../../../imgs/tokyu-transfers3_2.jpg" x="0" y="0" width="1920" height="1080" opacity="0.2" />
</svg>
