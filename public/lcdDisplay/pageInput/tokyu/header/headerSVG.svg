<svg id="display" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <!-- グラデーション・フィルターをこのファイルで定義する（defs.svg廃止のため） -->
  <defs>
    <linearGradient id="tokyuBackGradient" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0.00%" stop-color="rgb(74, 75, 86)" />
      <stop offset="47.31%" stop-color="rgb(37, 37, 41)" />
      <stop offset="47.92%" stop-color="rgb(6, 6, 8)" />
      <stop offset="52.06%" stop-color="rgb(7, 7, 7)" />
      <stop offset="92.70%" stop-color="rgb(75, 74, 81)" />
      <stop offset="93.05%" stop-color="rgb(166, 167, 172)" />
      <stop offset="94.63%" stop-color="rgb(21, 21, 21)" />
      <stop offset="95.16%" stop-color="rgb(255, 255, 255)" />
      <stop offset="96.73%" stop-color="rgb(255, 255, 255)" />
      <stop offset="96.99%" stop-color="rgb(255, 0, 0)" />
      <stop offset="99.68%" stop-color="rgb(255, 0, 0)" />
      <stop offset="100.00%" stop-color="rgb(255, 30, 30)" />
    </linearGradient>
    <linearGradient id="innerGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgb(255, 255, 255)" />
      <stop offset="51%" stop-color="rgb(220, 220, 220)" />
      <stop offset="51.11%" stop-color="rgb(158, 158, 158)" />
      <stop offset="81.11%" stop-color="rgb(201, 201, 201)" />
      <stop offset="100%" stop-color="rgb(228, 228, 228)" />
    </linearGradient>
    <linearGradient id="outerGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgb(255, 255, 255)" />
      <stop offset="17.78%" stop-color="rgb(228, 228, 228)" />
      <stop offset="48.89%" stop-color="rgb(182, 182, 182)" />
      <stop offset="51.11%" stop-color="rgb(158, 158, 158)" />
      <stop offset="81.11%" stop-color="rgb(201, 201, 201)" />
      <stop offset="100%" stop-color="rgb(228, 228, 228)" />
    </linearGradient>
    <linearGradient id="outlineGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgb(44, 44, 44)" />
      <stop offset="100%" stop-color="rgb(211, 211, 211)" />
    </linearGradient>
    <filter id="outline">
      <feMorphology in="SourceAlpha" result="DILATED" operator="dilate" radius="2" />
      <feFlood flood-color="black" result="BLACK"/>
      <feComposite in="BLACK" in2="DILATED" operator="in" result="OUTLINE"/>
      <feMerge>
        <feMergeNode in="OUTLINE"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="black" flood-opacity="0.5"/>
    </filter>
    <filter id="dropShadow2" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="-4" stdDeviation="4" flood-color="black" flood-opacity="0.5"/>
    </filter>
    <filter id="grayscale">
      <fecolormatrix type="matrix" values="0.3333 0.3333 0.3333 0 0.2 0.3333 0.3333 0.3333 0 0.2 0.3333 0.3333 0.3333 0 0.2 0 0 0 1 0"></fecolormatrix>
    </filter>
  </defs>

  <!-- ヘッダー -->
  <g lcdParts="group" id="header" visibility="visible">
    <!-- ヘッダー背景 -->
    <rect lcdParts="static" id="header-back" x="0" y="0" width="1920" height="350" fill="url(#tokyuBackGradient)" filter="url(#dropShadow)" />

    <!-- 号車表示 -->
    <g lcdParts="static" id="header-carNum">
      <rect x="1708" y="22" width="108" height="108" rx="11" ry="11" fill="url(#outlineGradient)" />
      <rect x="1711" y="25" width="102" height="102" rx="11" ry="11" fill="url(#outerGradient)" />
    </g>
    <rect lcdParts="textBox" lcdText="#{carNumber}" visible="true" id="carNumText" x="1723" y="39" width="78" height="78" fill="#99999950" data-style='{"fontWeight": "bold", "fontFamily": "sans-serif", "textAnchor": "middle"}' lang="en" />
    <rect lcdParts="textBox" lcdText="号車" lcd-animType="fade" visible="(langId == 0) or (langId == 1)" id="carText" x="1822" y="80" width="78" height="38" fill="#99999950" data-style='{"fontWeight": "bold", "fontFamily": "BIZ UDGothic", "textAnchor": "middle", "fill": "rgb(255, 255, 255)"}' />
    <rect lcdParts="textBox" lcdText="car No." lcd-animType="fade" visible="langId == 2" id="carTextEng" x="1575" y="35" width="125" height="38" fill="#99999950" data-style='{"fontWeight": "regular", "fontFamily": "sans-serif", "textAnchor": "middle", "fill": "rgb(255, 255, 255)"}' />

    <!-- 行先方面表示 -->
    <g lcdParts="arrange" visible="(langId == 0) or (langId == 1)" lcd-animType="fade" arrange-interval="10" arrange-axis="x">
      <rect lcdParts="arrangeArea" x="431" y="34" width="1136" height="79" fill="#99999950" />

      <rect lcdParts="textBox" lcdText="#{viaText}" lcd-fitX="true" x="431" y="51" width="200" height="62" lcd-verAlign="bottom" fill="#99999950" data-style='{"fontWeight": "bold", "fontFamily": "BIZ UDGothic", "textAnchor": "start", "fill": "rgb(255, 255, 255)"}' />
      <rect lcdParts="textBox" lcdText="#{destination}" lcd-fitX="true" x="431" y="34" width="200" height="79" fill="#99999950" data-style='{"fontWeight": "bold", "fontFamily": "BIZ UDGothic", "textAnchor": "start", "fill": "rgb(255, 255, 255)"}' />
      <rect lcdParts="textBox" lcdText="ゆき" lcd-fitX="true" x="431" y="34" width="1136" height="79" fill="#99999950" data-style='{"fontWeight": "bold", "fontFamily": "BIZ UDGothic", "textAnchor": "start", "fill": "rgb(255, 255, 255)"}' />
    </g>
    <g lcdParts="arrange" visible="langId == 2" arrange-interval="10" lcd-animType="fade" arrange-axis="x">
      <rect lcdParts="arrangeArea" x="431" y="34" width="1136" height="79" fill="#99999950" />
      <rect lcdParts="textBox" lcdText="for" lcd-fitX="true" x="431" y="34" width="1136" height="79" fill="#99999950" data-style='{"fontWeight": "bold", "fontFamily": "sans-serif", "textAnchor": "start", "fill": "rgb(255, 255, 255)"}' />
      <rect lcdParts="textBox" lcdText="#{destinationEng}" lcd-fitX="true" x="431" y="34" width="1136" height="79" fill="#99999950" data-style='{"fontWeight": "bold", "fontFamily": "sans-serif", "textAnchor": "start", "fill": "rgb(255, 255, 255)"}' />
    </g>

    <!-- 長時間停車中 -->
    <rect id="header-viaTextStop" x="431" y="34" width="1136" height="79" fill="#99999950" data-style='{"fontWeight": "bold", "fontFamily": "BIZ UDGothic", "textAnchor": "start", "fill": "rgb(255, 255, 255)"}' />
    <rect id="header-viaTextStopEng" x="431" y="34" width="1136" height="79" fill="#99999950" data-style='{"fontWeight": "bold", "fontFamily": "sans-serif", "textAnchor": "start", "fill": "rgb(255, 255, 255)"}' />
    <rect id="header-stopYukiText" x="1750" y="224" width="150" height="86" fill="#99999950" data-style='{"fontWeight": "bold", "fontFamily": "BIZ UDGothic", "textAnchor": "end", "fill": "rgb(255, 255, 255)"}' />
    <rect id="header-stopYukiTextEng" x="75" y="200" width="305" height="73" fill="#99999950" data-style='{"fontWeight": "bold", "fontFamily": "sans-serif", "textAnchor": "end", "fill": "rgb(255, 255, 255)"}' />

    <!-- 種別表示 -->
    <g lcdParts="static" id="header-trainType">
      <rect x="21" y="22" width="363" height="108" rx="11" ry="11" fill="url(#outlineGradient)" />
      <rect id="trainTypeBackColor" x="24" y="25" width="357" height="102" rx="11" ry="11" fill="rgb(255, 51, 85)" />
      <rect x="24" y="25" width="357" height="102" rx="11" ry="11" fill="url(#outerGradient)" style="mix-blend-mode: multiply;" />
    </g>
    <rect lcdParts="textBox" lcdText="#{trainType}" lcd-animType="fade" visible="(langId == 0) or (langId == 1)" id="trainTypeText" x="40" y="38" width="325" height="75" fill="#99999950" data-style='{"fontFamily": "BIZ UDGothic", "fontWeight": "bold", "textAnchor": "middle", "fill": "rgb(255, 255, 255)", "letterSpacing": {"2": "30px", "3": "20px"}, "textShadow": "3px 3px 3px rgb(50, 50, 50)"}' />
    <rect lcdParts="textBox" lcdText="#{trainTypeEng}" lcd-animType="fade" visible="langId == 2" id="trainTypeTextEng" x="40" y="38" width="325" height="75" fill="#99999950" data-style='{"fontFamily": "sans-serif", "fontWeight": "bold", "textAnchor": "middle", "fill": "rgb(255, 255, 255)", "letterSpacing": {"2": "30px", "3": "20px"}, "textShadow": "3px 3px 3px rgb(50, 50, 50)"}' />
    <!-- 種別補足表示 -->
    <rect lcdParts="textBox" lcdText="#{trainTypeSubText}" lcd-animType="fade" visible="(langId == 0) or (langId == 1)" id="trainTypeSubText" x="23" y="133" width="359" height="43" fill="#99999950" data-style='{"fontFamily": "BIZ UDGothic", "fontWeight": "bold", "textAnchor": "start", "fill": "rgb(255, 255, 255)"}' />
    <rect lcdParts="textBox" lcdText="#{trainTypeSubTextEng}" lcd-animType="fade" visible="langId == 2" id="trainTypeSubTextEng" x="23" y="133" width="359" height="43" fill="#99999950" data-style='{"fontFamily": "sans-serif", "fontWeight": "bold", "textAnchor": "start", "fill": "rgb(255, 255, 255)"}' />

    <!-- ナンバリング -->
    <rect lcdParts="numbering" lcd-numKey="#{nowStation.numIconPresetKey}" symbolText="#{nowStation.numIconSymbol}" numberText="#{nowStation.numIconNumber}" lineColor="#{nowStation.lineColor}" outlineWidth="5" x="482" y="152" width="163" height="162" />

    <!-- 駅名 -->
    <rect lcdParts="textBox" lcdText="#{nowStation.name}" lcd-animType="kuru" visible="langId == 0" id="header-stationNameText" x="690" y="140" width="1040" height="170" fill="#99999950" data-style='{"fontFamily": "BIZ UDGothic", "fontWeight": "600", "fill": "rgb(255, 255, 255)", "textAnchor": "middle", "letterSpacing": {"2": "110px","3": "30px", "4": "20px"}}' />
    <rect lcdParts="textBox" lcdText="#{nowStation.kana}" lcd-animType="kuru" visible="langId == 1" id="header-stationNameTextEng" x="690" y="140" width="1040" height="170" fill="#99999950" data-style='{"fontFamily": "sans-serif", "fontWeight": "600", "fill": "rgb(255, 255, 255)", "textAnchor": "middle"}' />
    <rect lcdParts="textBox" lcdText="#{nowStation.eng}" lcd-animType="kuru" visible="langId == 2" id="header-stationNameTextEng" x="690" y="140" width="1040" height="170" fill="#99999950" data-style='{"fontFamily": "sans-serif", "fontWeight": "600", "fill": "rgb(255, 255, 255)", "textAnchor": "middle"}' />

    <!-- つぎは、まもなく、ただいま -->
    <rect lcdParts="textBox" lcdText="ただいま" lcd-animType="fade" visible="(runState == 0) and ((langId == 0) or (langId == 1)) and !(isTerminal)" id="header-runStateText" x="75" y="240" width="305" height="73" fill="#99999950" data-style='{"fontFamily": "BIZ UDGothic", "fontWeight": "600", "fill": "rgb(255, 255, 255)", "textAnchor": "end"}' />
    <rect lcdParts="textBox" lcdText="つぎは" lcd-animType="fade" visible="(runState == 1) and ((langId == 0)  or (langId == 1)) and !(isTerminal)" id="header-runStateText" x="75" y="240" width="305" height="73" fill="#99999950" data-style='{"fontFamily": "BIZ UDGothic", "fontWeight": "600", "fill": "rgb(255, 255, 255)", "textAnchor": "end"}' />
    <rect lcdParts="textBox" lcdText="まもなく" lcd-animType="fade" visible="(runState == 2) and ((langId == 0) or (langId == 1)) and !(isTerminal)" id="header-runStateText" x="75" y="240" width="305" height="73" fill="#99999950" data-style='{"fontFamily": "BIZ UDGothic", "fontWeight": "600", "fill": "rgb(255, 255, 255)", "textAnchor": "end"}' />
    <rect lcdParts="textBox" lcdText="Next" lcd-animType="fade" visible="(langId == 2) and !(runState == 0) and !(isTerminal)" id="header-runStateTextEng" x="75" y="200" width="305" height="73" fill="#99999950" data-style='{"fontFamily": "sans-serif", "fontWeight": "600", "fill": "rgb(255, 255, 255)", "textAnchor": "end"}' />

    <rect lcdParts="textBox" lcdText="ただいま終点" lcd-animType="fade" visible="(runState == 0) and ((langId == 0) or (langId == 1)) and (isTerminal)" id="header-runStateTerminalText" x="45" y="240" width="400" height="73" fill="#99999950" data-style='{"fontFamily": "BIZ UDGothic", "fontWeight": "600", "fill": "rgb(255, 255, 255)", "textAnchor": "end", "letterSpacing": {"2": "25px"}}' />
    <rect lcdParts="textBox" lcdText="つぎは終点" lcd-animType="fade" visible="(runState == 1) and ((langId == 0) or (langId == 1)) and (isTerminal)" id="header-runStateTerminalText" x="45" y="240" width="400" height="73" fill="#99999950" data-style='{"fontFamily": "BIZ UDGothic", "fontWeight": "600", "fill": "rgb(255, 255, 255)", "textAnchor": "end", "letterSpacing": {"2": "25px"}}' />
    <rect lcdParts="textBox" lcdText="まもなく終点" lcd-animType="fade" visible="(runState == 2) and ((langId == 0) or (langId == 1)) and (isTerminal)" id="header-runStateTerminalText" x="45" y="240" width="400" height="73" fill="#99999950" data-style='{"fontFamily": "BIZ UDGothic", "fontWeight": "600", "fill": "rgb(255, 255, 255)", "textAnchor": "end", "letterSpacing": {"2": "25px"}}' />
    <rect lcdParts="textBox" lcdText="Next Terminal" lcd-animType="fade" visible="(langId == 2) and !(runState == 0) and (isTerminal)" id="header-runStateTerminalTextEng" x="45" y="200" width="400" height="73" fill="#99999950" data-style='{"fontFamily": "sans-serif", "fontWeight": "600", "fill": "rgb(255, 255, 255)", "textAnchor": "end"}' />
  </g>
</svg>
