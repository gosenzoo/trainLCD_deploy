<svg id="display" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
    <!-- defs.svgから移植したグラデーション・フィルター定義 -->
    <defs>
        <linearGradient id="innerGradient" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="rgb(255, 255, 255)" />
            <stop offset="51%" stop-color="rgb(220, 220, 220)" />
            <stop offset="51.11%" stop-color="rgb(158, 158, 158)" />
            <stop offset="81.11%" stop-color="rgb(201, 201, 201)" />
            <stop offset="100%" stop-color="rgb(228, 228, 228)" />
        </linearGradient>
        <linearGradient id="outerGradient" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="rgb(255, 255, 255)" />
            <stop offset="17.78%" stop-color="rgb(228, 228, 228)" />
            <stop offset="48.89%" stop-color="rgb(182, 182, 182)" />
            <stop offset="51.11%" stop-color="rgb(158, 158, 158)" />
            <stop offset="81.11%" stop-color="rgb(201, 201, 201)" />
            <stop offset="100%" stop-color="rgb(228, 228, 228)" />
        </linearGradient>
        <linearGradient id="outlineGradient" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="rgb(44, 44, 44)" />
            <stop offset="100%" stop-color="rgb(211, 211, 211)" />
        </linearGradient>
        <filter id="outline">
            <feMorphology in="SourceAlpha" result="DILATED" operator="dilate" radius="2" />
            <feFlood flood-color="black" result="BLACK"/>
            <feComposite in="BLACK" in2="DILATED" operator="in" result="OUTLINE"/>
            <feMerge>
                <feMergeNode in="OUTLINE"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="black" flood-opacity="0.5"/>
        </filter>
        <filter id="dropShadow2" x="-50%" y="-50%" width="200%" height="200%">
            <feDropShadow dx="0" dy="-4" stdDeviation="4" flood-color="black" flood-opacity="0.5"/>
        </filter>
        <linearGradient id="lineShadowLeft" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#ffffff" />
            <stop offset="100%" stop-color="#000000" />
        </linearGradient>
        <linearGradient id="lineShadowRight" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#000000" />
            <stop offset="100%" stop-color="#ffffff" />
        </linearGradient>
        <filter id="grayscale">
            <feColorMatrix type="matrix" values="0.3333 0.3333 0.3333 0 0.2 0.3333 0.3333 0.3333 0 0.2 0.3333 0.3333 0.3333 0 0.2 0 0 0 1 0" />
        </filter>
    </defs>

    <!-- 背景 -->
    <rect lcdParts="static" id="background" x="0" y="0" width="1920" height="1080" fill="#FFFFFF" />


    <!-- 乗換欄背景 -->
    <rect lcdParts="static" x="0" y="862" width="1920" height="218" fill="#ffffff" filter="url(./defs.svg#dropShadow2)"></rect>
    <rect lcdParts="textBox" lcdText="のりかえ" x="30" y="878" width="207" height="57" fill="#999999" data-style='{"fontFamily": "BIZ UDGothic", "fontWeight": "600", "textAnchor": "middle"}'></rect>
    <rect lcdParts="textBox" lcdText="Transfer" x="32" y="942" width="203" height="36" fill="#999999" data-style='{"fontFamily": "sans-serif", "fontWeight": "600", "textAnchor": "middle"}'></rect>
    
    <!-- 乗換欄1行 -->
    <g lcdParts="arrange" isDraw="platform.transfers.length == 1" arrange-interval="40">
        <rect lcdParts="arrangeArea" x="280" y="886" width="1600" height="88" fill="#d2d2d244" />
        <g lcdParts="arrange" lcd-arg="transfer:platform.transfers[0]" arrange-interval="10" lcd-fitX="true">
            <rect lcdParts="arrangeArea" x="280" y="886" width="500" height="88" fill="#d2d2d2FF" />
            <rect lcdParts="textBox" lcdText="#{$transfer.lineIcon}" lcd-minComRatio="1" lcd-fitX="true" x="280" y="886" width="90" height="88" fill="#999999" data-style='{"fontFamily": "BIZ UDGothic", "fontWeight": "600", "textAnchor": "start", "letterSpacing": "5px"}' />
            <g lcdParts="arrange" arrange-interval="3" arrange-axis="y" lcd-fitX="true">
                <rect lcdParts="arrangeArea" x="380" y="886" width="300" height="88" fill="#999999" />
                <rect lcdParts="textBox" lcdText="#{$transfer.name}" lcd-fitX="true" x="380" y="886" width="300" height="57" fill="#444444" data-style='{"fontFamily": "BIZ UDGothic", "fontWeight": "600", "textAnchor": "start"}' />
                <rect lcdParts="textBox" lcdText="#{$transfer.eng}" lcd-fitX="true" x="380" y="946" width="300" height="28" fill="#444444" data-style='{"fontFamily": "sans-serif", "fontWeight": "600", "textAnchor": "start"}' />
            </g>
        </g>
    </g>
    <!-- 乗換欄複数行 -->
    <g lcdParts="arrange" isDraw="platform.transfers.length != 1" arrange-axis="y" arrange-interval="5">
        <rect lcdParts="arrangeArea" x="280" y="866" width="1600" height="128" fill="#999999" />
        <!-- 各行 -->
        <g lcdParts="arrange" lcd-arg="transferList:platform.transfers" lcd-fitX="true" arrange-interval="10">
            <rect lcdParts="arrangeArea" x="280" y="886" width="1600" height="88" fill="#d2d2d244" />
            <!-- 各パーツ -->
            <g lcdParts="arrange" lcd-arg="transfer:$transferList" arrange-interval="10" lcd-fitX="true">
                <rect lcdParts="arrangeArea" x="280" y="886" width="500" height="88" fill="#d2d2d2FF" />
                <rect lcdParts="textBox" lcdText="#{$transfer.lineIcon}" lcd-minComRatio="1" lcd-fitX="true" x="280" y="886" width="90" height="88" fill="#999999" data-style='{"fontFamily": "BIZ UDGothic", "fontWeight": "600", "textAnchor": "start", "letterSpacing": "5px"}' />
                <g lcdParts="arrange" arrange-interval="3" arrange-axis="y" lcd-fitX="true">
                    <rect lcdParts="arrangeArea" x="380" y="886" width="300" height="88" fill="#999999" />
                    <rect lcdParts="textBox" lcdText="#{$transfer.name}" lcd-fitX="true" x="380" y="886" width="300" height="57" fill="#444444" data-style='{"fontFamily": "BIZ UDGothic", "fontWeight": "600", "textAnchor": "start"}' />
                    <rect lcdParts="textBox" lcdText="#{$transfer.eng}" lcd-fitX="true" x="380" y="946" width="300" height="28" fill="#444444" data-style='{"fontFamily": "sans-serif", "fontWeight": "600", "textAnchor": "start"}' />
                </g>
            </g>
        </g>
    </g>


    <!-- フッター -->
    <!-- 次の停車駅 -->
    <rect lcdParts="textBox" lcdText="#{nowStation.name}を出ますと【#{nextStopName}】にとまります" visible="langId != 2" isDraw="isDrawNextStation" x="30" y="1010" width="1310" height="50" fill="#999999" data-style='{"fontFamily": "BIZ UDGothic", "fontWeight": "bold", "textAnchor": "start", "fill": "rgb(0, 0, 0)"}' lang="ja" />


    <!-- 参考画像 -->
    <image id="platform-jitubutu" href="../../../imgs/tokyu-platform.png" x="0" y="0" width="1920" height="1080" opacity="0.5" />
</svg>
