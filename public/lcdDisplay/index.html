<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Drawer デバッグ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDGothic:wght@400;700&family=M+PLUS+1:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: "Overused Grotesk";
      src: url("/fonts/OverusedGrotesk-SemiBold.woff2") format('woff2');
      font-weight: 600;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: #1e1e1e; color: #ccc; font-family: sans-serif; }

    #svg-wrap { background: #333; display: flex; justify-content: center; }
    svg { width: 100%; max-width: 1920px; display: block; }

    #controls {
      padding: 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #controls h2 { margin: 0 0 4px; font-size: 14px; color: #aaa; }

    #param-list {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 6px 12px;
      align-items: start;
    }
    .param-label {
      font-size: 13px;
      color: #9cdcfe;
      padding-top: 5px;
      word-break: break-all;
    }
    .param-input {
      background: #2d2d2d;
      border: 1px solid #444;
      border-radius: 4px;
      color: #d4d4d4;
      font-size: 13px;
      padding: 4px 8px;
      width: 100%;
    }
    .param-input:focus { outline: none; border-color: #569cd6; }
    textarea.param-input { resize: vertical; font-family: monospace; }
    input[type="checkbox"].param-input {
      width: auto;
      padding: 0;
      margin-top: 6px;
      accent-color: #569cd6;
    }

    #redraw-btn {
      align-self: flex-start;
      padding: 8px 24px;
      background: #0e639c;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }
    #redraw-btn:hover { background: #1177bb; }
  </style>
</head>
<body>
  <div id="svg-wrap">
    <svg id="display" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080"></svg>
  </div>

  <div id="svg-toolbar" style="padding:8px 24px;display:flex;align-items:center;gap:16px;background:#2a2a2a;border-bottom:1px solid #444;">
    <button id="redraw-btn">再描画</button>
    <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;">
      <input type="checkbox" id="debug-chk" style="accent-color:#569cd6;">
      デバッグ表示（arrangeArea境界: 青 / 末端要素境界: 赤）
    </label>
  </div>

  <div id="controls">
    <h2>描画パラメータ</h2>
    <div id="param-list"></div>
  </div>

  <script src="../jsMojules/utilClass/TextDrawer.js"></script>
  <script src="ExprParser.js"></script>
  <script src="LcdPartsObj.js"></script>
  <script src="TextBoxObj.js"></script>
  <script src="ArrangeObj.js"></script>
  <script src="Drawer.js"></script>
  <script>
    const svg = document.getElementById('display');
    const paramList = document.getElementById('param-list');
    let drawer;

    // drawParamsの各エントリを入力フィールドとして生成する
    function buildControls(params) {
      paramList.innerHTML = '';
      for (const [key, val] of Object.entries(params)) {
        const label = document.createElement('div');
        label.className = 'param-label';
        label.textContent = key;

        let input;
        if (typeof val === 'boolean') {
          input = document.createElement('input');
          input.type = 'checkbox';
          input.checked = val;
          input.dataset.type = 'boolean';
        } else if (typeof val === 'number') {
          input = document.createElement('input');
          input.type = 'number';
          input.value = val;
          input.dataset.type = 'number';
        } else if (typeof val === 'object' && val !== null) {
          input = document.createElement('textarea');
          input.value = JSON.stringify(val, null, 2);
          input.rows = Math.min(Object.keys(val).length + 2, 12);
          input.dataset.type = 'json';
        } else {
          input = document.createElement('input');
          input.type = 'text';
          input.value = val ?? '';
          input.dataset.type = 'string';
        }
        input.className = 'param-input';
        input.dataset.key = key;

        paramList.appendChild(label);
        paramList.appendChild(input);
      }
    }

    // 入力フィールドからdrawParamsを収集する
    function collectParams() {
      const params = {};
      paramList.querySelectorAll('[data-key]').forEach(el => {
        const key = el.dataset.key;
        switch (el.dataset.type) {
          case 'boolean': params[key] = el.checked; break;
          case 'number':  params[key] = Number(el.value); break;
          case 'json':
            try { params[key] = JSON.parse(el.value); }
            catch { params[key] = {}; }
            break;
          default: params[key] = el.value;
        }
      });
      return params;
    }

    // SVGをクリアして再描画する
    function redraw() {
      drawer.drawParams = collectParams();
      drawer.debug = document.getElementById('debug-chk').checked;
      while (svg.firstChild) svg.removeChild(svg.firstChild);
      svg.appendChild(drawer.draw(svg));
    }

    window.onload = async () => {
      drawer = new Drawer();
      await drawer.load();

      // lcdSVGのサイズをheaderSVGのviewBoxに合わせる
      const viewBox = drawer.templateSVG.getAttribute('viewBox');
      if (viewBox) svg.setAttribute('viewBox', viewBox);

      // 初期描画とコントロール生成
      svg.appendChild(drawer.draw(svg));
      buildControls(drawer.drawParams);

      document.getElementById('redraw-btn').addEventListener('click', redraw);

      // キーボードショートカット: L=langIdサイクル / R=runStateサイクル / T=isTerminal切替
      document.addEventListener('keydown', e => {
        // 入力欄にフォーカスがある場合は無視
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

        const key = e.key.toUpperCase();
        if (key === 'L') {
          cycleNumberParam('langId', 0, 2);
        } else if (key === 'R') {
          cycleNumberParam('runState', 0, 2);
        } else if (key === 'T') {
          toggleBoolParam('isTerminal');
        } else {
          return; // 対象外キーは再描画しない
        }
        redraw();
      });
    };

    // 数値パラメータをmin～maxの範囲でサイクルさせる
    function cycleNumberParam(key, min, max) {
      const el = paramList.querySelector(`[data-key="${key}"]`);
      if (!el) return;
      const current = Number(el.value);
      el.value = current >= max ? min : current + 1;
    }

    // boolean パラメータのチェック状態を反転する
    function toggleBoolParam(key) {
      const el = paramList.querySelector(`[data-key="${key}"]`);
      if (!el) return;
      el.checked = !el.checked;
    }
  </script>
</body>
</html>
